name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package (required for downstream typecheck)
        run: pnpm --filter @tacfinity/shared build

      - name: Lint
        run: pnpm -r run lint

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test
        run: pnpm -r run test
