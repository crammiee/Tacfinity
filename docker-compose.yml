services:
  postgres:
    image: postgres:16-alpine
    container_name: tacfinity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tacfinity
      POSTGRES_PASSWORD: tacfinity
      POSTGRES_DB: tacfinity
    ports:
      - "5433:5432"
    volumes:
      - tacfinity-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tacfinity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tacfinity-pgdata:
